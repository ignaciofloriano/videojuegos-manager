<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Videojuegos</title>
    <link rel="stylesheet" href="style.css?v=2">
    <!-- clases css problematicas, no veo las barritas con codigo en styles.css pero aqui si !-->
    <style>
        .genre-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .genre-label { font-size: 13px; color: #1d1d1f; width: 120px; flex-shrink: 0; }
        .genre-bar-bg { flex: 1; height: 8px; border-radius: 99px; background: #F5F5F7; }
        .genre-bar { height: 8px; border-radius: 99px; background: #534AB7; }
        .genre-count { font-size: 12px; color: #86868b; width: 20px; text-align: right; }
    </style>
</head>
<body>
<div class="app">
    <div class="topbar">
        <div class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24"><path d="M21 6H3a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h18a1 1 0 0 0 1-1V7a1 1 0 0 0-1-1zm-1 10H4V8h16v8zm-8-6h2v2h-2zm-4 0h2v2H8zm8 0h2v2h-2z"/></svg>
            </div>
            <span class="logo-name">ManaGame</span>
            <span class="logo-sub">Mi colección de videojuegos</span>
        </div>
        <div class="nav-tabs">
            <button class="tab active" id="tab-col" onclick="showTab('col')">Colección</button>
            <button class="tab" id="tab-stats" onclick="showTab('stats')">Estadísticas</button>
        </div>
    </div>

    <div class="main">
        <div id="view-col" class="collection-view">
            <div class="stats-row" id="stat-cards"></div>
            <div class="section-header">
                <span class="section-title">Mis juegos</span>
                <div style="display:flex;gap:8px;align-items:center">
                    <button class="add-btn" onclick="openPanel()">+ Añadir juego</button>
                    <div class="search-bar">
                        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                        <input type="text" id="search-input" placeholder="Buscar juego..." oninput="renderTable()">
                    </div>
                </div>
            </div>
            <div class="table-card">
                <table>
                    <thead>
                    <tr>
                        <th>Título</th>
                        <th>Plataforma</th>
                        <th>Género</th>
                        <th>Año</th>
                        <th>Nota</th>
                        <th>Estado</th>
                    </tr>
                    </thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
        </div>

        <div id="view-stats" class="stats-view" style="display:none">
            <div class="stats-row" id="stat-cards2"></div>
            <div class="table-card" style="padding:24px;margin-top:16px">
                <div class="section-title" style="margin-bottom:16px">Juegos por género</div>
                <div id="genre-chart"></div>
            </div>
        </div>
    </div>
    <div id="panel-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.35); z-index:100;" onclick="closePanel()">
        <div class="panel" onclick="event.stopPropagation()">
            <div class="panel-title" id="panel-title">Añadir juego</div>
            <div>
                <label class="field-label">Título</label>
                <input class="field-input" id="f-titulo" placeholder="Nombre del juego">
            </div>
            <div>
                <label class="field-label">Plataforma</label>
                <select class="field-input" id="f-plat">
                    <option>PC</option>
                    <option>PS5</option>
                    <option>PS4</option>
                    <option>Switch</option>
                    <option>Xbox</option>
                </select>
            </div>
            <div class="field-row">
                <div>
                    <label class="field-label">Género</label>
                    <input class="field-input" id="f-genero" placeholder="RPG, Aventura...">
                </div>
                <div>
                    <label class="field-label">Año</label>
                    <input class="field-input" id="f-anio" type="number" value="2024">
                </div>
            </div>
            <div>
                <label class="field-label">Desarrolladora</label>
                <input class="field-input" id="f-desarrolladora" placeholder="Nintendo, Sony...">
            </div>
            <div>
                <label class="field-label">Estado</label>
                <select class="field-input" id="f-estado">
                    <option>PENDIENTE</option>
                    <option>JUGANDO</option>
                    <option>COMPLETADO</option>
                    <option>ABANDONADO</option>
                </select>
            </div>
            <div>
                <label class="field-label">Nota: <span id="nota-val">5/10</span></label>
                <input type="range" min="0" max="10" step="0.5" id="f-nota" value="5" style="width:100%" oninput="document.getElementById('nota-val').textContent=this.value+'/10'">
            </div>
            <div>
                <label class="field-label">Notas</label>
                <textarea class="field-input" id="f-notas" rows="3" placeholder="Comentarios..."></textarea>
            </div>
            <div style="display:flex;flex-direction:column;gap:8px;margin-top:8px">
                <button class="save-btn" onclick="saveJuego()">Guardar</button>
                <button class="cancel-btn" onclick="closePanel()">Cancelar</button>
            </div>
        </div>
    </div>
</div>
<script>
    console.log('CSS cargado:', document.styleSheets.length);
    let db = [];

    function platClass(p) {
        const map = { 'Switch': 'plat-switch', 'PC': 'plat-pc', 'PS4': 'plat-ps4', 'PS5': 'plat-ps5', 'Xbox': 'plat-xbox' };
        return map[p] || 'plat-default';
    }

    function stars(n) {
        let s = '';
        for (let i = 1; i <= 10; i++) {
            s += `<span style="color:${i <= n ? '#BA7517' : '#ddd'}">★</span>`;
        }
        return s;
    }

    function renderStatCards(id) {
        if (db.length === 0) return;
        const total = db.length;
        const comp = db.filter(g => g.estado === 'COMPLETADO').length;
        const avg = (db.reduce((s, g) => s + g.puntuacion, 0) / total).toFixed(1);
        const mejor = db.reduce((a, b) => b.puntuacion > a.puntuacion ? b : a);
        document.getElementById(id).innerHTML = `
            <div class="stat-card"><div class="stat-label">Total de juegos</div><div class="stat-value">${total}</div></div>
            <div class="stat-card"><div class="stat-label">Completados</div><div class="stat-value" style="color:#1D9E75">${comp}</div><div class="stat-sub">${Math.round(comp/total*100)}% de la colección</div></div>
            <div class="stat-card"><div class="stat-label">Nota media</div><div class="stat-value">${avg}<span style="font-size:14px;color:#86868b">/10</span></div></div>
            <div class="stat-card"><div class="stat-label">Mejor valorado</div><div class="stat-value" style="font-size:15px;line-height:1.3">${mejor.titulo}</div><div class="stat-sub">${mejor.puntuacion}/10</div></div>
        `;
    }

    function renderTable() {
        const q = document.getElementById('search-input').value.toLowerCase();
        const filtered = db.filter(g =>
            g.titulo.toLowerCase().includes(q) ||
            g.plataforma.toLowerCase().includes(q) ||
            g.genero.toLowerCase().includes(q)
        );
        document.getElementById('tbody').innerHTML = filtered.map(g => `
            <tr>
                <td style="font-weight:500">${g.titulo}</td>
                <td><span class="plat-badge ${platClass(g.plataforma)}">${g.plataforma}</span></td>
                <td style="color:#86868b;font-size:12px">${g.genero}</td>
                <td style="color:#86868b">${g.año}</td>
                <td>${stars(g.puntuacion)}</td>
                <td>
                    <span class="status-dot"><span class="dot dot-${g.estado.toUpperCase()}"></span>${g.estado}</span>
                    <span style="float:right">
                        <button class="action-btn" onclick='openPanel(${JSON.stringify(g)})'>Editar</button>
                        <button class="action-btn del" onclick="deleteJuego('${g.titulo}')">Borrar</button>
                    </span>
                </td>
            </tr>
        `).join('');
        renderStatCards('stat-cards');
    }

    function renderStats() {
    renderStatCards('stat-cards2');
    const byGen = {};
    db.forEach(g => { byGen[g.genero] = (byGen[g.genero] || 0) + 1; });
    const maxG = Math.max(...Object.values(byGen));
    const chart = document.getElementById('genre-chart');
    chart.innerHTML = '';
    Object.entries(byGen)
        .sort((a, b) => b[1] - a[1])
        .forEach(([g, n]) => {
            const row = document.createElement('div');
            row.className = 'genre-row';
            row.innerHTML = `
                <span class="genre-label">${g}</span>
                <div class="genre-bar-bg">
                    <div class="genre-bar" style="width:${Math.round(n/maxG*100)}%"></div>
                </div>
                <span class="genre-count">${n}</span>
            `;
            chart.appendChild(row);
        });
}

    function showTab(t) {
    document.getElementById('tab-col').classList.toggle('active', t === 'col');
    document.getElementById('tab-stats').classList.toggle('active', t === 'stats');

    const viewCol = document.getElementById('view-col');
    const viewStats = document.getElementById('view-stats');

    if (t === 'col') {
        viewCol.style.display = 'block';
        viewStats.style.display = 'none';
    } else {
        viewCol.style.display = 'none';
        viewStats.style.display = 'block';
        renderStats();
    }
}

loadJuegos();

    let editandoTitulo = null;

function openPanel(juego = null) {
    editandoTitulo = juego ? juego.titulo : null;
    document.getElementById('panel-title').textContent = juego ? 'Editar juego' : 'Añadir juego';
    document.getElementById('f-titulo').value = juego ? juego.titulo : '';
    document.getElementById('f-titulo').disabled = juego ? true : false;
    document.getElementById('f-plat').value = juego ? juego.plataforma : 'PC';
    document.getElementById('f-genero').value = juego ? juego.genero : '';
    document.getElementById('f-anio').value = juego ? juego.año : 2024;
    document.getElementById('f-desarrolladora').value = juego ? juego.desarrolladora : '';
    document.getElementById('f-estado').value = juego ? juego.estado : 'PENDIENTE';
    document.getElementById('f-nota').value = juego ? juego.puntuacion : 5;
    document.getElementById('nota-val').textContent = (juego ? juego.puntuacion : 5) + '/10';
    document.getElementById('f-notas').value = juego ? juego.notas : '';
    document.getElementById('panel-overlay').style.display = 'block';
}

function closePanel() {
    document.getElementById('panel-overlay').style.display = 'none';
    editandoTitulo = null;
}

function saveJuego() {
    const titulo = document.getElementById('f-titulo').value.trim();
    if (!titulo) return;
    const juego = {
        titulo: titulo,
        plataforma: document.getElementById('f-plat').value,
        genero: document.getElementById('f-genero').value.trim(),
        año: parseInt(document.getElementById('f-anio').value),
        desarrolladora: document.getElementById('f-desarrolladora').value.trim(),
        estado: document.getElementById('f-estado').value,
        puntuacion: parseFloat(document.getElementById('f-nota').value),
        notas: document.getElementById('f-notas').value.trim()
    };

    if (editandoTitulo) {
        fetch(`/api/juegos/${encodeURIComponent(editandoTitulo)}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(juego)
        }).then(() => { closePanel(); loadJuegos(); });
    } else {
        fetch('/api/juegos', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(juego)
        }).then(() => { closePanel(); loadJuegos(); });
    }
}

function deleteJuego(titulo) {
    fetch(`/api/juegos/${encodeURIComponent(titulo)}`, { method: 'DELETE' })
        .then(() => loadJuegos());
}

function loadJuegos() {
    fetch('/api/juegos')
        .then(res => res.json())
        .then(data => { db = data; renderTable(); });
}
</script>
</body>
</html>
